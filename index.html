<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDDIFF – Markdown Diff Editor</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #1a1b26;
      --bg-panel: #1f2133;
      --bg-editor: #16171f;
      --bg-toolbar: #24253a;
      --border: #2f3146;
      --text: #c0caf5;
      --text-muted: #565f89;
      --accent: #7aa2f7;
      --accent-hover: #89b4fa;
      --green: #9ece6a;
      --green-bg: rgba(158, 206, 106, 0.18);
      --green-bg-strong: rgba(158, 206, 106, 0.30);
      --green-gutter: rgba(158, 206, 106, 0.22);
      --green-bar: #9ece6a;
      --red: #f7768e;
      --red-bg: rgba(247, 118, 142, 0.18);
      --red-bg-strong: rgba(247, 118, 142, 0.30);
      --red-gutter: rgba(247, 118, 142, 0.22);
      --red-bar: #f7768e;
      --yellow: #e0af68;
      --scrollbar: #2f3146;
      --scrollbar-hover: #3b3d57;
      --code-bg: rgba(122, 162, 247, 0.10);
      --gutter-bg: #13141c;
      --gutter-text: #3b3d57;
      --diff-add-text: #73daca;
      --diff-del-text: #f7768e;
    }

    :root[data-theme="light"] {
      --bg: #f0f0f5;
      --bg-panel: #e8e8f0;
      --bg-editor: #ffffff;
      --bg-toolbar: #dddde8;
      --border: #c8c8d8;
      --text: #343b58;
      --text-muted: #8990b3;
      --accent: #2e5de0;
      --accent-hover: #4070f0;
      --green: #347d39;
      --green-bg: rgba(52, 125, 57, 0.14);
      --green-bg-strong: rgba(52, 125, 57, 0.25);
      --green-gutter: rgba(52, 125, 57, 0.18);
      --green-bar: #347d39;
      --red: #cf222e;
      --red-bg: rgba(207, 34, 46, 0.12);
      --red-bg-strong: rgba(207, 34, 46, 0.22);
      --red-gutter: rgba(207, 34, 46, 0.16);
      --red-bar: #cf222e;
      --yellow: #9a6700;
      --scrollbar: #c8c8d8;
      --scrollbar-hover: #b0b0c0;
      --code-bg: rgba(46, 93, 224, 0.06);
      --gutter-bg: #e8e8f0;
      --gutter-text: #b0b0c0;
      --diff-add-text: #1a7f37;
      --diff-del-text: #cf222e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Top Bar ─────────────────────────────────────── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 16px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .top-btn {
      padding: 5px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .top-btn:hover { color: var(--text); border-color: var(--accent); }
    .top-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }

    .top-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .diff-stats {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 11px;
      display: flex;
      gap: 6px;
      margin-left: auto;
      padding: 2px 10px;
      background: var(--bg-panel);
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .diff-stats .add { color: var(--green); font-weight: 600; }
    .diff-stats .del { color: var(--red); font-weight: 600; }

    .theme-toggle {
      padding: 5px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: all 0.15s;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--accent); }

    /* ─── History ──────────────────────────────────────── */
    .history-wrapper { position: relative; }

    .history-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 6px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 320px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      z-index: 100;
      overflow: hidden;
    }
    .history-dropdown.open { display: block; }

    .history-item {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: var(--bg-toolbar); }
    .history-item .history-files { flex: 1; overflow: hidden; }
    .history-item .history-file { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item .history-file.left::before { content: "L: "; color: var(--accent); font-weight: 600; }
    .history-item .history-file.right::before { content: "R: "; color: var(--accent); font-weight: 600; }
    .history-item .history-time { color: var(--text-muted); font-size: 11px; white-space: nowrap; align-self: center; }
    .history-empty { padding: 16px; text-align: center; color: var(--text-muted); font-size: 13px; }

    /* ─── Main ─────────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Panel ────────────────────────────────────────── */
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .panel:first-child { border-right: 2px solid var(--border); }

    .panel-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-toolbar .file-name {
      flex: 1;
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .panel-toolbar .file-name.has-file { color: var(--text); }
    .panel-toolbar .file-name .unsaved { color: var(--yellow); }

    .btn {
      padding: 3px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:hover { color: var(--text); border-color: var(--accent); }

    .btn-accent {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }
    .btn-accent:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    .btn-save { display: none; }
    .btn-save.visible { display: inline-block; }

    .btn-delta {
      padding: 2px 7px;
      font-size: 9px;
      line-height: 1;
      opacity: 0.3;
      border-radius: 3px;
    }
    .btn-delta.has-target { opacity: 0.8; }
    .btn-delta.has-target:hover { opacity: 1; border-color: var(--accent); color: var(--accent); background: var(--bg-panel); }

    /* ─── TOC (Inhaltsverzeichnis) ──────────────────── */
    .toc-wrapper { position: relative; }

    .toc-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 240px;
      max-width: 360px;
      max-height: 400px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      z-index: 100;
    }
    .toc-dropdown.open { display: block; }

    .toc-item {
      display: block;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background 0.1s;
    }
    .toc-item:last-child { border-bottom: none; }
    .toc-item:hover { background: var(--bg-toolbar); }
    .toc-item.toc-h1 { padding-left: 12px; font-weight: 600; }
    .toc-item.toc-h2 { padding-left: 24px; }
    .toc-item.toc-h3 { padding-left: 36px; font-size: 11px; }
    .toc-item.toc-h4 { padding-left: 48px; font-size: 11px; color: var(--text-muted); }
    .toc-item.toc-h5 { padding-left: 56px; font-size: 11px; color: var(--text-muted); }
    .toc-item.toc-h6 { padding-left: 64px; font-size: 11px; color: var(--text-muted); }

    .toc-item .toc-line {
      color: var(--text-muted);
      font-size: 10px;
      margin-left: 6px;
    }

    .toc-empty {
      padding: 12px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ─── Editor with Line Numbers ──────────────────── */
    .editor-wrapper {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .line-gutter {
      width: 52px;
      flex-shrink: 0;
      background: var(--gutter-bg);
      border-right: 1px solid var(--border);
      overflow: hidden;
      user-select: none;
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding-top: 8px;
    }

    .line-num {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      color: var(--gutter-text);
      height: 1.6em;
      position: relative;
    }

    .line-num.diff-add {
      background: var(--green-gutter);
      color: var(--green);
      font-weight: 700;
    }
    .line-num.diff-add::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--green-bar);
    }

    .line-num.diff-del {
      background: var(--red-gutter);
      color: var(--red);
      font-weight: 700;
    }
    .line-num.diff-del::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--red-bar);
    }

    .line-num.diff-mod {
      background: rgba(224, 175, 104, 0.15);
      color: var(--yellow);
      font-weight: 700;
    }
    .line-num.diff-mod::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--yellow);
    }

    .line-num.cursor-line {
      background: var(--accent) !important;
      color: #fff !important;
      font-weight: 700;
      opacity: 1;
    }

    .panel-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 2px 8px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .panel-label.original {
      background: var(--red-bg-strong);
      color: var(--red);
    }
    .panel-label.modified {
      background: var(--green-bg-strong);
      color: var(--green);
    }

    .editor-area {
      flex: 1;
      width: 0;
      height: 100%;
      background: var(--bg-editor);
      color: var(--text);
      border: none;
      resize: none;
      padding: 8px 12px;
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      tab-size: 2;
      outline: none;
      overflow-y: auto;
      overflow-x: auto;
      white-space: pre;
      caret-color: var(--accent);
    }

    .editor-area[readonly] {
      color: var(--text-muted);
      cursor: default;
    }

    /* ─── Preview ──────────────────────────────────────── */
    .preview-wrapper {
      flex: 1;
      display: none;
      overflow: hidden;
    }

    .preview-wrapper.visible { display: flex; }
    .editor-wrapper.hidden { display: none; }

    .preview-gutter {
      width: 48px;
      flex-shrink: 0;
      background: var(--gutter-bg);
      border-right: 1px solid var(--border);
      overflow: hidden;
      user-select: none;
    }

    .preview-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      background: var(--bg-panel);
      user-select: text;
    }

    /* ─── Markdown Styles ──────────────────────────────── */
    .md-render h1, .md-render h2, .md-render h3,
    .md-render h4, .md-render h5, .md-render h6 {
      color: var(--accent); margin: 0.8em 0 0.4em; line-height: 1.3;
    }
    .md-render h1 { font-size: 1.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
    .md-render h2 { font-size: 1.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.15em; }
    .md-render h3 { font-size: 1.1em; }
    .md-render p { margin: 0.5em 0; line-height: 1.6; }
    .md-render ul, .md-render ol { padding-left: 1.5em; margin: 0.4em 0; }
    .md-render li { margin: 0.2em 0; }
    .md-render code {
      background: var(--code-bg); padding: 2px 5px; border-radius: 3px;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.9em;
    }
    .md-render pre {
      background: var(--bg-editor); padding: 10px 14px; border-radius: 6px;
      overflow-x: auto; margin: 0.6em 0; border: 1px solid var(--border);
    }
    .md-render pre code { background: none; padding: 0; }
    .md-render blockquote { border-left: 3px solid var(--accent); padding-left: 10px; color: var(--text-muted); margin: 0.5em 0; }
    .md-render table { border-collapse: collapse; width: 100%; margin: 0.6em 0; }
    .md-render th, .md-render td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .md-render th { background: var(--bg-toolbar); font-weight: 600; }
    .md-render a { color: var(--accent); }
    .md-render img { max-width: 100%; border-radius: 4px; }
    .md-render hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }

    .diff-mark-added {
      background: var(--green-bg-strong);
      border-left: 3px solid var(--green-bar);
      padding: 1px 8px 1px 8px;
      display: block;
      margin: 1px 0;
      border-radius: 2px;
    }
    .diff-mark-removed {
      background: var(--red-bg-strong);
      border-left: 3px solid var(--red-bar);
      padding: 1px 8px 1px 8px;
      display: block;
      margin: 1px 0;
      border-radius: 2px;
      text-decoration: line-through;
      text-decoration-color: var(--red);
      opacity: 0.6;
    }

    .diff-tr-added td, .diff-tr-added th {
      background: var(--green-bg-strong);
      border-left: 2px solid var(--green-bar);
    }
    .diff-tr-removed td, .diff-tr-removed th {
      background: var(--red-bg-strong);
      border-left: 2px solid var(--red-bar);
      text-decoration: line-through;
      text-decoration-color: var(--red);
      opacity: 0.6;
    }

    .diff-tr-modified td, .diff-tr-modified th {
      background: rgba(224, 175, 104, 0.12);
      border-left: 2px solid var(--yellow);
    }

    /* ─── Scrollbar ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

    /* ─── Drop ──────────────────────────────────────────── */
    .panel.drag-over { outline: 2px dashed var(--accent); outline-offset: -4px; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="history-wrapper">
      <button class="top-btn" id="historyBtn" title="Letzte Vergleiche">&#9776; Verlauf</button>
      <div class="history-dropdown" id="historyDropdown"></div>
    </div>
    <button class="top-btn" id="openTwoBtn" title="Zwei Dateien zum Vergleichen öffnen (Cmd+O)">2 Dateien öffnen</button>
    <span class="top-sep"></span>
    <button class="top-btn" id="previewToggle">Vorschau</button>
    <div class="diff-stats" id="diffStats"></div>
    <button class="theme-toggle" id="themeToggle" title="Dark/Light Mode">&#9790;</button>
  </div>

  <div class="main">
    <!-- Left = Original -->
    <div class="panel" id="panelLeft" data-side="left">
      <div class="panel-toolbar">
        <span class="panel-label original">Original</span>
        <button class="btn btn-accent" id="openLeft">Öffnen</button>
        <span class="file-name" id="fileNameLeft">Keine Datei</span>
        <div class="toc-wrapper">
          <button class="btn toc-btn" data-side="left" title="Inhaltsverzeichnis">&#9776;</button>
          <div class="toc-dropdown" id="tocLeft" data-side="left"></div>
        </div>
        <button class="btn btn-delta" data-side="left" data-dir="prev" title="Vorheriges Delta">&#9650;</button>
        <button class="btn btn-delta" data-side="left" data-dir="next" title="Nächstes Delta">&#9660;</button>
      </div>
      <div class="editor-wrapper" id="editorWrapperLeft">
        <div class="line-gutter" id="gutterLeft"></div>
        <textarea class="editor-area" id="editorLeft" placeholder="Original-Datei öffnen..." spellcheck="false" readonly></textarea>
      </div>
      <div class="preview-wrapper" id="previewWrapperLeft">
        <div class="preview-gutter" id="previewGutterLeft"></div>
        <div class="preview-area md-render" id="previewLeft"></div>
      </div>
    </div>

    <!-- Right = Geändert -->
    <div class="panel" id="panelRight" data-side="right">
      <div class="panel-toolbar">
        <span class="panel-label modified">Geändert</span>
        <button class="btn btn-accent" id="openRight">Öffnen</button>
        <span class="file-name" id="fileNameRight">Keine Datei</span>
        <div class="toc-wrapper">
          <button class="btn toc-btn" data-side="right" title="Inhaltsverzeichnis">&#9776;</button>
          <div class="toc-dropdown" id="tocRight" data-side="right"></div>
        </div>
        <button class="btn btn-delta" data-side="right" data-dir="prev" title="Vorheriges Delta">&#9650;</button>
        <button class="btn btn-delta" data-side="right" data-dir="next" title="Nächstes Delta">&#9660;</button>
        <button class="btn btn-save" id="saveRight">Speichern</button>
      </div>
      <div class="editor-wrapper" id="editorWrapperRight">
        <div class="line-gutter" id="gutterRight"></div>
        <textarea class="editor-area" id="editorRight" placeholder="Geänderte Datei öffnen oder bearbeiten..." spellcheck="false"></textarea>
      </div>
      <div class="preview-wrapper" id="previewWrapperRight">
        <div class="preview-gutter" id="previewGutterRight"></div>
        <div class="preview-area md-render" id="previewRight"></div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
