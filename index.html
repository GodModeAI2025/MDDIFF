<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDDIFF – Markdown Diff Editor</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #1e1e2e;
      --bg-panel: #252536;
      --bg-editor: #1a1a2e;
      --bg-toolbar: #2a2a3e;
      --border: #3a3a5c;
      --text: #cdd6f4;
      --text-muted: #6c7086;
      --accent: #89b4fa;
      --accent-hover: #74c7ec;
      --green: #a6e3a1;
      --green-bg: rgba(166, 227, 161, 0.10);
      --green-gutter: rgba(166, 227, 161, 0.25);
      --red: #f38ba8;
      --red-bg: rgba(243, 139, 168, 0.10);
      --red-gutter: rgba(243, 139, 168, 0.25);
      --yellow: #f9e2af;
      --scrollbar: #45475a;
      --scrollbar-hover: #585b70;
      --code-bg: rgba(137, 180, 250, 0.12);
      --gutter-bg: #21213a;
    }

    :root[data-theme="light"] {
      --bg: #eff1f5;
      --bg-panel: #e6e9ef;
      --bg-editor: #ffffff;
      --bg-toolbar: #dce0e8;
      --border: #bcc0cc;
      --text: #4c4f69;
      --text-muted: #7c7f93;
      --accent: #1e66f5;
      --accent-hover: #2a7cfa;
      --green: #40a02b;
      --green-bg: rgba(64, 160, 43, 0.08);
      --green-gutter: rgba(64, 160, 43, 0.20);
      --red: #d20f39;
      --red-bg: rgba(210, 15, 57, 0.06);
      --red-gutter: rgba(210, 15, 57, 0.18);
      --yellow: #df8e1d;
      --scrollbar: #acb0be;
      --scrollbar-hover: #9ca0b0;
      --code-bg: rgba(30, 102, 245, 0.08);
      --gutter-bg: #d9dce5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Top Bar ─────────────────────────────────────── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 16px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .top-btn {
      padding: 5px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .top-btn:hover { color: var(--text); border-color: var(--accent); }
    .top-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }

    .top-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .diff-stats {
      font-size: 12px;
      display: flex;
      gap: 8px;
      margin-left: auto;
    }
    .diff-stats .add { color: var(--green); font-weight: 600; }
    .diff-stats .del { color: var(--red); font-weight: 600; }

    .theme-toggle {
      padding: 5px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: all 0.15s;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--accent); }

    /* ─── History ──────────────────────────────────────── */
    .history-wrapper { position: relative; }

    .history-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 6px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 320px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      z-index: 100;
      overflow: hidden;
    }
    .history-dropdown.open { display: block; }

    .history-item {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: var(--bg-toolbar); }
    .history-item .history-files { flex: 1; overflow: hidden; }
    .history-item .history-file { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item .history-file.left::before { content: "L: "; color: var(--accent); font-weight: 600; }
    .history-item .history-file.right::before { content: "R: "; color: var(--accent); font-weight: 600; }
    .history-item .history-time { color: var(--text-muted); font-size: 11px; white-space: nowrap; align-self: center; }
    .history-empty { padding: 16px; text-align: center; color: var(--text-muted); font-size: 13px; }

    /* ─── Main ─────────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Panel ────────────────────────────────────────── */
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .panel:first-child { border-right: 1px solid var(--border); }

    .panel-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-toolbar .file-name {
      flex: 1;
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .panel-toolbar .file-name.has-file { color: var(--text); }
    .panel-toolbar .file-name .unsaved { color: var(--yellow); }

    .btn {
      padding: 3px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:hover { color: var(--text); border-color: var(--accent); }

    .btn-accent {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }
    .btn-accent:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    .btn-save { display: none; }
    .btn-save.visible { display: inline-block; }

    /* ─── TOC (Inhaltsverzeichnis) ──────────────────── */
    .toc-wrapper { position: relative; }

    .toc-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 240px;
      max-width: 360px;
      max-height: 400px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      z-index: 100;
    }
    .toc-dropdown.open { display: block; }

    .toc-item {
      display: block;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background 0.1s;
    }
    .toc-item:last-child { border-bottom: none; }
    .toc-item:hover { background: var(--bg-toolbar); }
    .toc-item.toc-h1 { padding-left: 12px; font-weight: 600; }
    .toc-item.toc-h2 { padding-left: 24px; }
    .toc-item.toc-h3 { padding-left: 36px; font-size: 11px; }
    .toc-item.toc-h4 { padding-left: 48px; font-size: 11px; color: var(--text-muted); }
    .toc-item.toc-h5 { padding-left: 56px; font-size: 11px; color: var(--text-muted); }
    .toc-item.toc-h6 { padding-left: 64px; font-size: 11px; color: var(--text-muted); }

    .toc-item .toc-line {
      color: var(--text-muted);
      font-size: 10px;
      margin-left: 6px;
    }

    .toc-empty {
      padding: 12px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ─── Editor with Line Numbers ──────────────────── */
    .editor-wrapper {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .line-gutter {
      width: 48px;
      flex-shrink: 0;
      background: var(--gutter-bg);
      border-right: 1px solid var(--border);
      overflow: hidden;
      user-select: none;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding-top: 8px;
    }

    .line-num {
      display: block;
      text-align: right;
      padding-right: 8px;
      color: var(--text-muted);
      opacity: 0.6;
      height: 1.6em;
    }

    .line-num.diff-add {
      background: var(--green-gutter);
      color: var(--green);
      opacity: 1;
    }

    .line-num.diff-del {
      background: var(--red-gutter);
      color: var(--red);
      opacity: 1;
    }

    .editor-scroll {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-width: 0;
    }

    .editor-highlight {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 8px 12px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre;
      pointer-events: none;
      z-index: 0;
    }

    .hl-line {
      display: block;
      min-height: 1.6em;
      margin: 0 -12px;
      padding: 0 12px;
    }

    .hl-line.hl-add { background: var(--green-bg); }
    .hl-line.hl-del { background: var(--red-bg); }

    .editor-area {
      position: relative;
      width: 100%;
      height: 100%;
      background: transparent;
      color: var(--text);
      border: none;
      resize: none;
      padding: 8px 12px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      tab-size: 2;
      outline: none;
      overflow-y: auto;
      overflow-x: auto;
      white-space: pre;
      z-index: 1;
      caret-color: var(--text);
    }

    /* ─── Preview ──────────────────────────────────────── */
    .preview-wrapper {
      flex: 1;
      display: none;
      overflow: hidden;
    }

    .preview-wrapper.visible { display: flex; }
    .editor-wrapper.hidden { display: none; }

    .preview-gutter {
      width: 48px;
      flex-shrink: 0;
      background: var(--gutter-bg);
      border-right: 1px solid var(--border);
      overflow: hidden;
      user-select: none;
    }

    .preview-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      background: var(--bg-panel);
      user-select: text;
    }

    /* ─── Markdown Styles ──────────────────────────────── */
    .md-render h1, .md-render h2, .md-render h3,
    .md-render h4, .md-render h5, .md-render h6 {
      color: var(--accent); margin: 0.8em 0 0.4em; line-height: 1.3;
    }
    .md-render h1 { font-size: 1.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
    .md-render h2 { font-size: 1.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.15em; }
    .md-render h3 { font-size: 1.1em; }
    .md-render p { margin: 0.5em 0; line-height: 1.6; }
    .md-render ul, .md-render ol { padding-left: 1.5em; margin: 0.4em 0; }
    .md-render li { margin: 0.2em 0; }
    .md-render code {
      background: var(--code-bg); padding: 2px 5px; border-radius: 3px;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.9em;
    }
    .md-render pre {
      background: var(--bg-editor); padding: 10px 14px; border-radius: 6px;
      overflow-x: auto; margin: 0.6em 0; border: 1px solid var(--border);
    }
    .md-render pre code { background: none; padding: 0; }
    .md-render blockquote { border-left: 3px solid var(--accent); padding-left: 10px; color: var(--text-muted); margin: 0.5em 0; }
    .md-render table { border-collapse: collapse; width: 100%; margin: 0.6em 0; }
    .md-render th, .md-render td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .md-render th { background: var(--bg-toolbar); font-weight: 600; }
    .md-render a { color: var(--accent); }
    .md-render img { max-width: 100%; border-radius: 4px; }
    .md-render hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }

    .diff-mark-added { background: var(--green-bg); border-left: 3px solid var(--green); padding-left: 6px; display: block; margin: 2px 0; }
    .diff-mark-removed { background: var(--red-bg); border-left: 3px solid var(--red); padding-left: 6px; display: block; margin: 2px 0; text-decoration: line-through; opacity: 0.7; }

    /* ─── Scrollbar ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

    /* ─── Drop ──────────────────────────────────────────── */
    .panel.drag-over { outline: 2px dashed var(--accent); outline-offset: -4px; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="history-wrapper">
      <button class="top-btn" id="historyBtn" title="Letzte Vergleiche">&#9776; Verlauf</button>
      <div class="history-dropdown" id="historyDropdown"></div>
    </div>
    <button class="top-btn" id="openTwoBtn" title="Zwei Dateien zum Vergleichen öffnen (Cmd+O)">2 Dateien öffnen</button>
    <span class="top-sep"></span>
    <button class="top-btn" id="previewToggle">Vorschau</button>
    <div class="diff-stats" id="diffStats"></div>
    <button class="theme-toggle" id="themeToggle" title="Dark/Light Mode">&#9790;</button>
  </div>

  <div class="main">
    <!-- Left -->
    <div class="panel" id="panelLeft" data-side="left">
      <div class="panel-toolbar">
        <button class="btn btn-accent" id="openLeft">Öffnen</button>
        <span class="file-name" id="fileNameLeft">Keine Datei</span>
        <div class="toc-wrapper">
          <button class="btn toc-btn" data-side="left" title="Inhaltsverzeichnis">&#9776;</button>
          <div class="toc-dropdown" id="tocLeft" data-side="left"></div>
        </div>
        <button class="btn btn-save" id="saveLeft">Speichern</button>
      </div>
      <div class="editor-wrapper" id="editorWrapperLeft">
        <div class="line-gutter" id="gutterLeft"></div>
        <div class="editor-scroll">
          <div class="editor-highlight" id="highlightLeft"></div>
          <textarea class="editor-area" id="editorLeft" placeholder="Markdown eingeben oder Datei öffnen..." spellcheck="false"></textarea>
        </div>
      </div>
      <div class="preview-wrapper" id="previewWrapperLeft">
        <div class="preview-gutter" id="previewGutterLeft"></div>
        <div class="preview-area md-render" id="previewLeft"></div>
      </div>
    </div>

    <!-- Right -->
    <div class="panel" id="panelRight" data-side="right">
      <div class="panel-toolbar">
        <button class="btn btn-accent" id="openRight">Öffnen</button>
        <span class="file-name" id="fileNameRight">Keine Datei</span>
        <div class="toc-wrapper">
          <button class="btn toc-btn" data-side="right" title="Inhaltsverzeichnis">&#9776;</button>
          <div class="toc-dropdown" id="tocRight" data-side="right"></div>
        </div>
        <button class="btn btn-save" id="saveRight">Speichern</button>
      </div>
      <div class="editor-wrapper" id="editorWrapperRight">
        <div class="line-gutter" id="gutterRight"></div>
        <div class="editor-scroll">
          <div class="editor-highlight" id="highlightRight"></div>
          <textarea class="editor-area" id="editorRight" placeholder="Markdown eingeben oder Datei öffnen..." spellcheck="false"></textarea>
        </div>
      </div>
      <div class="preview-wrapper" id="previewWrapperRight">
        <div class="preview-gutter" id="previewGutterRight"></div>
        <div class="preview-area md-render" id="previewRight"></div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
